services:
  web:
    build:
      context: .
      dockerfile: web/Containerfile
    container_name: sveltekit-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - pb
    environment:
      POCKETBASE_URL: http://pb:8090
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  pb:
    build:
      context: .
      dockerfile: pb/Containerfile
    container_name: pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/app/pb_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pb_data:
